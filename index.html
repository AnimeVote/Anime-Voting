<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeVerse</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    padding:20px;
    text-align:center;
    background:#111827;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:48px;
}

.btn{
    padding:15px 30px;
    background:#ef4444;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:30px;
}

.card{
    background:#1e293b;
    width:250px;
    border-radius:15px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.card h3{
    text-align:center;
}

.rankings{
    padding:30px;
    max-width:600px;
    margin:auto;
}

.rankings li{
    margin:10px 0;
}

</style>
</head>

<body>

<header>
    <h2>🎭 AnimeVerse</h2>
</header>

<section class="hero">
    <h1>Vote For Your Favorite Anime</h1>
    <p>Discover anime and help decide the rankings.</p>
    <button class="btn">Start Voting</button>
</section>

<section class="cards">

<div class="card">
<img src="https://via.placeholder.com/250x350">
<h3>One Piece</h3>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x350">
<h3>Naruto</h3>
</div>

<div class="card">
<img src="https://via.placeholder.com/250x350">
<h3>Attack on Titan</h3>
</div>

</section>

<section class="rankings">
<h2>🏆 Top Anime</h2>

<ol>
<li>One Piece</li>
<li>Attack on Titan</li>
<li>Naruto</li>
</ol>

</section>

</body>
</html>
