<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeVerse</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#081229;
color:white;
}

header{
background:#101827;
padding:15px;
text-align:center;
position:sticky;
top:0;
z-index:100;
}

header h1{
font-size:32px;
}

.container{
padding:15px;
}

.search{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:20px;
}

.section-title{
font-size:28px;
margin-bottom:15px;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
display:block;
}

.card-content{
padding:10px;
}

.card h3{
font-size:16px;
margin-bottom:5px;
}

.info{
font-size:13px;
color:#cbd5e1;
margin-bottom:10px;
}

.btn{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
font-size:14px;
cursor:pointer;
}

.rankings{
margin-top:30px;
}

.rank{
background:#1e293b;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

footer{
text-align:center;
padding:25px;
color:#94a3b8;
margin-top:20px;
}

@media(max-width:480px){
.section-title{
font-size:24px;
}

.card img{
height:160px;
}
}
</style>

</head>
<body>

<header>
<h1>🎭 AnimeVerse</h1>
</header>

<div class="container">

<input
type="text"
class="search"
placeholder="🔍 Search Anime..."
>

<h2 class="section-title">🔥 Popular Anime</h2>

<div class="cards">

<div class="card">
<img src="https://picsum.photos/400/600?1">
<div class="card-content">
<h3>One Piece</h3>
<p class="info">Episodes: 1120+</p>
<button class="btn">View Details</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/600?2">
<div class="card-content">
<h3>Naruto</h3>
<p class="info">Episodes: 220</p>
<button class="btn">View Details</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/600?3">
<div class="card-content">
<h3>Attack on Titan</h3>
<p class="info">Episodes: 89</p>
<button class="btn">View Details</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/600?4">
<div class="card-content">
<h3>Death Note</h3>
<p class="info">Episodes: 37</p>
<button class="btn">View Details</button>
</div>
</div>

</div>

<div class="rankings">

<h2 class="section-title">🏆 Top Anime</h2>

<div class="rank">🥇 One Piece</div>
<div class="rank">🥈 Attack on Titan</div>
<div class="rank">🥉 Naruto</div>
<div class="rank">4️⃣ Death Note</div>

</div>

</div>

<footer>
AnimeVerse © 2026
</footer>

</body>
</html>
