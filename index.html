<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeVerse</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1020;
color:white;
}

header{
background:#111827;
padding:15px;
text-align:center;
}

header h1{
font-size:24px;
}

.hero{
padding:30px 15px;
text-align:center;
}

.hero h2{
font-size:32px;
line-height:1.2;
margin-bottom:10px;
}

.hero p{
font-size:15px;
color:#cbd5e1;
margin-bottom:20px;
}

.btn{
background:#ef4444;
color:white;
border:none;
padding:12px 24px;
border-radius:8px;
font-size:16px;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:15px;
}

.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
display:block;
}

.card-content{
padding:10px;
}

.card h3{
font-size:15px;
margin-bottom:5px;
}

.card p{
font-size:13px;
color:#cbd5e1;
}

.vote-btn{
width:100%;
margin-top:10px;
padding:10px;
background:#ef4444;
border:none;
border-radius:6px;
color:white;
}

.rankings{
padding:15px;
}

.rankings h2{
text-align:center;
margin-bottom:15px;
}

.rank{
background:#1e293b;
padding:12px;
border-radius:8px;
margin-bottom:8px;
}

footer{
text-align:center;
padding:20px;
color:#94a3b8;
}

</style>
</head>

<body>

<header>
<h1>🎭 AnimeVerse</h1>
</header>

<section class="hero">
<h2>Vote Your Favorite Anime</h2>
<p>Community anime rankings powered by fans.</p>
<button class="btn">Start Voting</button>
</section>

<section class="cards">

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/6/73245.jpg">
<div class="card-content">
<h3>One Piece</h3>
<p>1120+ Episodes</p>
<button class="vote-btn">Vote</button>
</div>
</div>

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/13/17405.jpg">
<div class="card-content">
<h3>Naruto</h3>
<p>220 Episodes</p>
<button class="vote-btn">Vote</button>
</div>
</div>

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/10/47347.jpg">
<div class="card-content">
<h3>Attack on Titan</h3>
<p>89 Episodes</p>
<button class="vote-btn">Vote</button>
</div>
</div>

<div class="card">
<img src="https://cdn.myanimelist.net/images/anime/9/9453.jpg">
<div class="card-content">
<h3>Death Note</h3>
<p>37 Episodes</p>
<button class="vote-btn">Vote</button>
</div>
</div>

</section>

<section class="rankings">
<h2>🏆 Top Rankings</h2>

<div class="rank">🥇 One Piece</div>
<div class="rank">🥈 Attack on Titan</div>
<div class="rank">🥉 Death Note</div>
<div class="rank">4️⃣ Naruto</div>

</section>

<footer>
AnimeVerse © 2026
</footer>

</body>
</html>
