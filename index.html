<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeVerse</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#081229;
color:white;
}

header{
background:#101827;
padding:15px;
text-align:center;
position:sticky;
top:0;
z-index:100;
}

header h1{
font-size:32px;
}

.container{
padding:15px;
}

.search{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:10px;
}

.section-title{
font-size:28px;
margin:20px 0 15px;
}

.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.card-content{
padding:10px;
}

.card h3{
font-size:16px;
margin-bottom:5px;
}

.info{
font-size:13px;
color:#cbd5e1;
margin-bottom:8px;
}

.btn{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ef4444;
color:white;
font-size:14px;
cursor:pointer;
margin-bottom:10px;
}

.rankings{
margin-top:30px;
}

.rank{
background:#1e293b;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

footer{
text-align:center;
padding:25px;
color:#94a3b8;
margin-top:20px;
}

@media(max-width:480px){
.card img{
height:160px;
}
}
</style>
</head>

<body>

<header>
<h1>🎭 AnimeVerse</h1>
</header>

<div class="container">

<input
type="text"
id="searchBox"
class="search"
placeholder="🔍 Search Anime..."
>

<button class="btn" onclick="searchAnime()">
Search
</button>

<h2 class="section-title">🔥 Popular Anime</h2>

<div class="cards" id="animeResults">

<div class="card">
<img src="https://picsum.photos/400/600?1">
<div class="card-content">
<h3>One Piece</h3>
<p class="info">Episodes: 1120+</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/600?2">
<div class="card-content">
<h3>Naruto</h3>
<p class="info">Episodes: 220</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/600?3">
<div class="card-content">
<h3>Attack on Titan</h3>
<p class="info">Episodes: 89</p>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/600?4">
<div class="card-content">
<h3>Death Note</h3>
<p class="info">Episodes: 37</p>
</div>
</div>

</div>

<div class="rankings">

<h2 class="section-title">🏆 Top Anime</h2>

<div class="rank">🥇 One Piece</div>
<div class="rank">🥈 Attack on Titan</div>
<div class="rank">🥉 Naruto</div>
<div class="rank">4️⃣ Death Note</div>

</div>

</div>

<footer>
AnimeVerse © 2026
</footer>

<script>
async function searchAnime(){

const animeName = document.getElementById("searchBox").value;

if(!animeName){
alert("Enter anime name");
return;
}

try{

const response = await fetch(
`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(animeName)}&limit=1`
);

const data = await response.json();

if(!data.data || data.data.length === 0){
alert("Anime not found");
return;
}

const anime = data.data[0];

document.getElementById("animeResults").innerHTML = `
<div class="card">
<img src="${anime.images.jpg.large_image_url}">
<div class="card-content">
<h3>${anime.title}</h3>
<p class="info">⭐ Score: ${anime.score || "N/A"}</p>
<p class="info">📺 Episodes: ${anime.episodes || "Unknown"}</p>
<p class="info">📅 Year: ${anime.year || "Unknown"}</p>
</div>
</div>
`;

}catch(error){
alert("Error loading anime");
console.error(error);
}

}
</script>

</body>
</html>
